<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活動報名平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>活動報名</h1>
        <button id="open-admin" class="ghost-button" type="button">管理</button>
      </header>

      <main class="public-stage">
        <section id="event-list" class="event-strip"></section>
      </main>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <div id="public-overlay" class="public-overlay hidden" aria-hidden="true">
      <div class="public-backdrop" data-close-public="true"></div>
      <section class="public-modal" aria-label="活動報名表">
        <button id="close-public" class="icon-button public-close" type="button" aria-label="關閉活動">
          ×
        </button>
        <div id="public-detail"></div>
      </section>
    </div>

    <div id="admin-overlay" class="admin-overlay hidden" aria-hidden="true">
      <div class="admin-backdrop" data-close-admin="true"></div>
      <aside class="admin-drawer" aria-label="後台管理">
        <div class="admin-header">
          <div>
            <p class="section-eyebrow">後台</p>
            <h3>活動管理中心</h3>
          </div>
          <button id="close-admin" class="icon-button" type="button" aria-label="關閉後台">
            ×
          </button>
        </div>
        <div id="admin-root" class="admin-root"></div>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
